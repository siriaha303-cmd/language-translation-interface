<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            padding: 20px;
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { 
            background: #1a73e8; 
            color: white; 
            padding: 25px; 
            text-align: center; 
        }
        .header h1 { font-size: 28px; font-weight: 500; }
        .header p { opacity: 0.9; margin-top: 5px; }
        .main-content { padding: 30px; }
        .controls { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        select { 
            flex: 1; 
            padding: 12px; 
            font-size: 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            background: white;
            cursor: pointer;
        }
        select:focus { outline: none; border-color: #1a73e8; }
        .swap-btn { 
            background: #e8f0fe; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 20px; 
            color: #1a73e8;
            transition: 0.3s;
        }
        .swap-btn:hover { background: #d2e3fc; transform: rotate(180deg); }
        .text-areas { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .text-box { position: relative; }
        .text-box label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            color: #5f6368; 
            font-size: 14px; 
        }
        textarea { 
            width: 100%; 
            height: 250px; 
            padding: 15px; 
            font-size: 16px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            resize: none; 
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #1a73e8; }
        #outputText { background: #f8f9fa; }
        .char-count { 
            position: absolute; 
            bottom: 10px; 
            right: 15px; 
            font-size: 12px; 
            color: #5f6368; 
        }
        .action-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .btn-primary { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #1557b0; box-shadow: 0 2px 8px rgba(26,115,232,0.4); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .status { color: #5f6368; font-size: 14px; }
        .loader { display: none; color: #1a73e8; }
        
        @media (max-width: 768px) {
            .text-areas { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 Language Translation Interface</h1>
            <p>Translate text between 18+ languages instantly</p>
        </div>
        
        <div class="main-content">
            <div class="controls">
                <select id="sourceLang"></select>
                <button class="swap-btn" onclick="swapLanguages()" title="Swap languages">⇄</button>
                <select id="targetLang"></select>
            </div>

            <div class="text-areas">
                <div class="text-box">
                    <label>Enter Text</label>
                    <textarea id="inputText" placeholder="Type or paste text here..." maxlength="5000"></textarea>
                    <span class="char-count" id="charCount">0 / 5000</span>
                </div>
                <div class="text-box">
                    <label>Translation</label>
                    <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn-primary" id="translateBtn" onclick="translateText()">Translate</button>
                <div class="status">
                    <span class="loader" id="loader">Translating...</span>
                    <span id="statusText"></span>
                </div>
            </div>
        </div>
    </div>

<script>
const API = 'http://localhost:5000/api';
let languages = {};

// Load languages on page load
window.onload = async () => {
    try {
        const res = await fetch(`${API}/languages`);
        languages = await res.json();
        
        const sourceSelect = document.getElementById('sourceLang');
        const targetSelect = document.getElementById('targetLang');
        
        Object.entries(languages).forEach(([code, name]) => {
            sourceSelect.innerHTML += `<option value="${code}">${name}</option>`;
            if (code !== 'auto') {
                targetSelect.innerHTML += `<option value="${code}">${name}</option>`;
            }
        });
        
        sourceSelect.value = 'auto';
        targetSelect.value = 'en';
    } catch (err) {
        document.getElementById('statusText').innerText = 'Error: Backend not running';
    }
};

// Character counter
document.getElementById('inputText').addEventListener('input', (e) => {
    document.getElementById('charCount').innerText = `${e.target.value.length} / 5000`;
});

// Translate function
async function translateText() {
    const text = document.getElementById('inputText').value.trim();
    const source = document.getElementById('sourceLang').value;
    const target = document.getElementById('targetLang').value;
    
    if (!text) {
        alert('Please enter text to translate');
        return;
    }
    
    const btn = document.getElementById('translateBtn');
    const loader = document.getElementById('loader');
    const output = document.getElementById('outputText');
    
    btn.disabled = true;
    loader.style.display = 'inline';
    output.value = '';
    
    try {
        const res = await fetch(`${API}/translate`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text, source, target})
        });
        const data = await res.json();
        
        if (data.error) {
            output.value = 'Error: ' + data.error;
        } else {
            output.value = data.translated;
            if (source === 'auto') {
                document.getElementById('statusText').innerText = `Detected: ${languages[data.detected_lang] || data.detected_lang}`;
            }
        }
    } catch (err) {
        output.value = 'Error: Cannot connect to server. Is backend running?';
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}

// Swap languages
function swapLanguages() {
    const source = document.getElementById('sourceLang');
    const target = document.getElementById('targetLang');
    const input = document.getElementById('inputText');
    const output = document.getElementById('outputText');
    
    if (source.value === 'auto') {
        alert('Cannot swap when source is Auto Detect');
        return;
    }
    
    [source.value, target.value] = [target.value, source.value];
    [input.value, output.value] = [output.value, input.value];
    document.getElementById('charCount').innerText = `${input.value.length} / 5000`;
}

// Ctrl+Enter to translate
document.getElementById('inputText').addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') translateText();
});
</script>
</body>
</html>
